; Dowsion LocalProxy - Subconverter external config
; Generated from LocalProxy_防DNS泄露.yaml
; 使用方式：/sub?target=clash&url=你的订阅URL&config=本ini的URL
; DNS 防泄露配置放在 companion base yaml：https://raw.githubusercontent.com/Dowsion-dev/ClashCustom/refs/heads/main/Dowsion_LocalProxy_Base.yaml

[custom]
enable_rule_generator=true
overwrite_original_rules=true
exclude_remarks=(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|\bJP(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|Japan|JAPAN|Tokyo|Osaka|NRT|HND|KIX|台湾|台北|台中|新北|彰化|\bTW(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|Taiwan|TAIWAN|Taipei|TPE)

; Clash/Mihomo 基础配置，包含 DNS 防泄露设置。
; 如果上传到 GitHub，请把这里改成 base yaml 的 raw URL。
clash_rule_base=https://raw.githubusercontent.com/Dowsion-dev/ClashCustom/refs/heads/main/Base.yaml

